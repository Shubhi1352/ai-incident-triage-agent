spring:
  data:
    redis:
      host: localhost
      port: 6379
  
  datasource:
    url: jdbc:postgresql://localhost:5432/triagedb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  jackson:
    time-zone: Asia/Kolkata
    serialization:
      write-dates-as-timestamps: false

server:
  error:
    include-stacktrace: never

ai:
  ollama:
    url: http://localhost:11434/api