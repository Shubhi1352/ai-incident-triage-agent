spring:
  data:
    redis:
      host: redis
      port: 6379
  
  datasource:
    url: jdbc:postgresql://postgres:5432/triagedb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  jackson:
    time-zone: Asia/Kolkata
    serialization:
      write-dates-as-timestamps: false

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    connection-timeout: 5000
    listener:
      simple:
        concurrency: 3
        max-concurrency: 5
        auto-startup: true
        declaration-retries: 10
        missing-queues-fatal: false
        recovery-backoff: 5000

server:
  error:
    include-stacktrace: never

ai:
  provider: huggingface
  huggingface:
    url: https://router.huggingface.co/v1/chat/completions
    model: ${HF_MODEL}
    token: ${HF_TOKEN}